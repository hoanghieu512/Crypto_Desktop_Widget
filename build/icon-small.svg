<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Simplified variant for 16/32px: no text, no grid lines, no inner rings.
       Dark outlines separate the three coins so they read as distinct dots. -->
  <defs>
    <linearGradient id="bgDarkS" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2026"/>
      <stop offset="1" stop-color="#0b0e11"/>
    </linearGradient>
    <linearGradient id="goldCoinS" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd768"/>
      <stop offset="1" stop-color="#d9a200"/>
    </linearGradient>
    <linearGradient id="silverCoinS" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8edf4"/>
      <stop offset="1" stop-color="#9aa6b5"/>
    </linearGradient>
    <linearGradient id="greenCoinS" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#36c995"/>
      <stop offset="1" stop-color="#1d7d5c"/>
    </linearGradient>
    <clipPath id="squircleS"><rect x="92" y="92" width="840" height="840" rx="194"/></clipPath>
  </defs>

  <g clip-path="url(#squircleS)">
    <rect x="92" y="92" width="840" height="840" fill="url(#bgDarkS)"/>

    <!-- silver coin (back-left) -->
    <circle cx="360" cy="478" r="200" fill="url(#silverCoinS)" stroke="#0b0e11" stroke-width="28"/>

    <!-- gold coin (back-right) -->
    <circle cx="676" cy="438" r="206" fill="url(#goldCoinS)" stroke="#0b0e11" stroke-width="28"/>

    <!-- crypto coin (front-center, largest) -->
    <circle cx="516" cy="630" r="238" fill="url(#greenCoinS)" stroke="#0b0e11" stroke-width="28"/>
  </g>
</svg>
